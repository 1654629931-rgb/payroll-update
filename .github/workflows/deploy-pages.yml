name: 自动部署工资系统到 GitHub Pages

on:
  # 推送到 main 分支时自动触发部署
  push:
    branches: [ "main" ]
  # 支持手动点击触发
  workflow_dispatch:

# 配置部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 第一步：安装依赖 + 构建项目生成 dist
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./payroll-mobile/package-lock.json

      - name: 安装项目依赖
        working-directory: ./payroll-mobile
        run: npm ci

      - name: 构建打包生成 dist
        working-directory: ./payroll-mobile
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./payroll-mobile/dist

  # 第二步：把 dist 部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 执行部署
        id: deployment
        uses: actions/deploy-pages@v4
